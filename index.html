<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Mail Klassifizierung – Demo by np93.io</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --grey: #1a1a1a;
      --grey2: #2a2a2a;
      --muted: #666;
      --gruen: #22c55e;
      --gruen-bg: rgba(34,197,94,0.08);
      --gelb: #eab308;
      --gelb-bg: rgba(234,179,8,0.08);
      --rot: #ef4444;
      --rot-bg: rgba(239,68,68,0.08);
      --accent: #f5f5f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,245,240,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,245,240,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--white);
      text-decoration: none;
    }

    .logo span {
      color: var(--muted);
      font-weight: 400;
    }

    .badge {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 5px 12px;
      border-radius: 2px;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    .headline {
      margin-bottom: 48px;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 16px;
    }

    h1 strong {
      font-weight: 600;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 500px;
    }

    /* Form */
    .form-card {
      background: var(--grey);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 36px;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      background: var(--black);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    input:focus, textarea:focus {
      border-color: rgba(255,255,255,0.25);
    }

    input::placeholder, textarea::placeholder {
      color: #444;
    }

    textarea { height: 120px; }

    /* Presets */
    .presets {
      margin-bottom: 28px;
    }

    .presets-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .preset-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .preset-btn {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 7px 14px;
      border-radius: 2px;
      border: 1px solid;
      cursor: pointer;
      background: transparent;
      transition: all 0.15s;
    }

    .preset-btn.g {
      border-color: rgba(34,197,94,0.3);
      color: var(--gruen);
    }
    .preset-btn.g:hover { background: var(--gruen-bg); }

    .preset-btn.y {
      border-color: rgba(234,179,8,0.3);
      color: var(--gelb);
    }
    .preset-btn.y:hover { background: var(--gelb-bg); }

    .preset-btn.r {
      border-color: rgba(239,68,68,0.3);
      color: var(--rot);
    }
    .preset-btn.r:hover { background: var(--rot-bg); }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--white);
      color: var(--black);
      border: none;
      border-radius: 3px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .submit-btn:hover { background: #e0e0db; }
    .submit-btn:disabled {
      background: var(--grey2);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result-card {
      display: none;
      border-radius: 4px;
      padding: 32px 36px;
      border: 1px solid;
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card.gruen {
      background: var(--gruen-bg);
      border-color: rgba(34,197,94,0.2);
    }
    .result-card.gelb {
      background: var(--gelb-bg);
      border-color: rgba(234,179,8,0.2);
    }
    .result-card.rot {
      background: var(--rot-bg);
      border-color: rgba(239,68,68,0.2);
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .result-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .gruen .result-dot { background: var(--gruen); box-shadow: 0 0 12px var(--gruen); }
    .gelb .result-dot { background: var(--gelb); box-shadow: 0 0 12px var(--gelb); }
    .rot .result-dot { background: var(--rot); box-shadow: 0 0 12px var(--rot); animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 8px var(--rot); }
      50% { box-shadow: 0 0 20px var(--rot); }
    }

    .result-label {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .gruen .result-label { color: var(--gruen); }
    .gelb .result-label { color: var(--gelb); }
    .rot .result-label { color: var(--rot); }

    .result-action {
      font-size: 13px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.05em;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 20px 0;
    }

    .result-reason-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .result-reason {
      font-size: 15px;
      line-height: 1.6;
      color: var(--white);
    }

    /* Error */
    .error-msg {
      display: none;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 3px;
      padding: 16px 20px;
      font-size: 13px;
      color: #f87171;
      font-family: 'Space Mono', monospace;
      margin-top: 16px;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    footer a {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
    }

    footer a:hover { color: var(--white); }

    @media (max-width: 600px) {
      header { padding: 20px; }
      .form-card { padding: 24px 20px; }
      main { padding: 40px 16px 60px; }
    }
  </style>
</head>
<body>

<header>
  <a href="https://np93.io" class="logo">np93<span>.io</span></a>
  <span class="badge">Live Demo</span>
</header>

<main>
  <div class="headline">
    <p class="eyebrow">AI Email Intelligence</p>
    <h1>E-Mail <strong>Klassifizierung</strong><br>in Echtzeit</h1>
    <p class="subtitle">Gib eine E-Mail ein und sieh, wie das System sie automatisch bewertet — Grün, Gelb oder Rot — mit Begründung.</p>
  </div>

  <div class="form-card">
    <div class="field">
      <label>Von (Absender)</label>
      <input type="text" id="from" placeholder="kunde@beispiel.de" value="kunde@beispiel.de" />
    </div>
    <div class="field">
      <label>Betreff</label>
      <input type="text" id="subject" placeholder="E-Mail Betreff..." />
    </div>
    <div class="field">
      <label>Nachricht</label>
      <textarea id="body" placeholder="E-Mail Inhalt hier eingeben..."></textarea>
    </div>

    <div class="presets">
      <p class="presets-label">Schnelltest — Beispiele laden:</p>
      <div class="preset-btns">
        <button class="preset-btn g" onclick="loadPreset('gruen')">✦ Grün Beispiel</button>
        <button class="preset-btn y" onclick="loadPreset('gelb')">✦ Gelb Beispiel</button>
        <button class="preset-btn r" onclick="loadPreset('rot')">✦ Rot Beispiel</button>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="classify()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">E-Mail klassifizieren</span>
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-top">
      <div class="result-dot"></div>
      <div>
        <div class="result-label" id="resultLabel"></div>
        <div class="result-action" id="resultAction"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="result-reason-label">Begründung</div>
    <div class="result-reason" id="resultReason"></div>
  </div>
</main>

<footer>
  <a href="https://np93.io" target="_blank">np93.io — AI Automation für Unternehmen</a>
</footer>

<script>
  // ← Replace with your actual n8n webhook URL
  const WEBHOOK_URL = "https://n8n.np93.io/webhook/demo-email";

  const presets = {
    gruen: {
      subject: "Öffnungszeiten",
      body: "Hallo, wann haben Sie geöffnet? Danke."
    },
    gelb: {
      subject: "Angebot für Großbestellung",
      body: "Hallo, wir sind an einer größeren Bestellung interessiert und würden gerne die Konditionen besprechen. Könnten Sie uns ein individuelles Angebot erstellen?"
    },
    rot: {
      subject: "Abmahnung – sofortige Reaktion erforderlich",
      body: "Hiermit mahnen wir Sie wegen einer schwerwiegenden Vertragsverletzung ab. Wir fordern eine schriftliche Stellungnahme innerhalb von 24 Stunden, andernfalls werden wir rechtliche Schritte einleiten."
    }
  };

  function loadPreset(type) {
    document.getElementById('subject').value = presets[type].subject;
    document.getElementById('body').value = presets[type].body;
    hideResult();
  }

  function hideResult() {
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function classify() {
    const from = document.getElementById('from').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const body = document.getElementById('body').value.trim();

    if (!subject || !body) {
      showError("Bitte Betreff und Nachricht ausfüllen.");
      return;
    }

    setLoading(true);
    hideResult();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from, subject, body })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      showResult(data);

    } catch (err) {
      showError("Verbindung zum Server fehlgeschlagen. Bitte n8n Webhook-URL prüfen.");
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  function showResult(data) {
    const card = document.getElementById('resultCard');
    const kat = (data.kategorie || '').toUpperCase();

    card.className = 'result-card';

    const map = {
      'GRÜN': { cls: 'gruen', label: '🟢 GRÜN', action: 'Automatisch verarbeitet' },
      'GELB': { cls: 'gelb', label: '🟡 GELB', action: 'Manuelle Prüfung erforderlich' },
      'ROT':  { cls: 'rot',  label: '🔴 ROT',  action: 'DRINGEND — sofortiges Handeln' }
    };

    const info = map[kat] || { cls: 'gelb', label: kat, action: 'Klassifiziert' };

    card.classList.add(info.cls);
    document.getElementById('resultLabel').textContent = info.label;
    document.getElementById('resultAction').textContent = info.action;
    document.getElementById('resultReason').textContent = data.grund || data.nachricht || '—';

    card.style.display = 'block';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function setLoading(on) {
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const txt = document.getElementById('btnText');
    btn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    txt.textContent = on ? 'Analysiere...' : 'E-Mail klassifizieren';
  }
</script>

</body>
</html>
